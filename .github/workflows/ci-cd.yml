name: WAF System CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-cov
    
    - name: Run WAF tests
      run: |
        python -m pytest tests/ -v --cov=waf_proxy --cov=siem_dashboards
    
    - name: Run SIEM tests
      run: |
        python -m pytest tests/siem/ -v
    
    - name: Security scan
      run: |
        pip install bandit safety
        bandit -r waf_proxy.py siem_dashboards.py
        safety check

  build:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Log in to Container Registry
      uses: docker/login-action@v2
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v4
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=sha,prefix={{branch}}-
          type=raw,value=latest,enable={{is_default_branch}}
    
    - name: Build and push WAF image
      uses: docker/build-push-action@v4
      with:
        context: .
        file: ./Dockerfile
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
    
    - name: Build and push SIEM image
      uses: docker/build-push-action@v4
      with:
        context: .
        file: ./Dockerfile.siem
        push: true
        tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-siem:latest
        labels: ${{ steps.meta.outputs.labels }}

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Deploy to staging
      run: |
        echo "Deploying to staging environment..."
        # 這裡可以加入實際的部署腳本
        # docker-compose -f docker-compose.ha.yml up -d
    
    - name: Run integration tests
      run: |
        echo "Running integration tests..."
        # 這裡可以加入整合測試腳本
    
    - name: Deploy to production
      if: success()
      run: |
        echo "Deploying to production environment..."
        # 這裡可以加入生產環境部署腳本

