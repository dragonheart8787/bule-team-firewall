# 真實軍事級防火牆系統配置
# Real Military-Grade Firewall System Configuration

system:
  name: "Real Military Firewall System"
  version: "2.0.0"
  debug: false
  log_level: "INFO"

# 真實軍事級加密配置
crypto:
  key_rotation_interval: 86400  # 24小時
  max_key_usage: 1000000
  default_key_lifetime: 365  # 天
  encryption_algorithms:
    - "AES-256-GCM"
    - "RSA-4096"
    - "ED25519"
    - "X25519"
  key_management:
    auto_rotation: true
    secure_storage: true
    backup_enabled: true

# 真實威脅獵殺配置
threat_hunting:
  monitoring_interval: 30  # 秒
  threat_intelligence_update: 3600  # 秒
  anomaly_threshold: 0.7
  detection_methods:
    - "signature"
    - "anomaly"
    - "behavioral"
    - "network"
    - "log_analysis"
  threat_categories:
    - "MALWARE"
    - "RANSOMWARE"
    - "BOTNET"
    - "INSIDER_THREAT"
    - "APT"
    - "DDoS"
    - "PHISHING"

# 真實零信任架構配置
zero_trust:
  trust_decay_rate: 0.1
  verification_interval: 300  # 秒
  policy_evaluation_timeout: 5  # 秒
  trust_levels:
    - "UNTRUSTED"
    - "LOW"
    - "MEDIUM"
    - "HIGH"
    - "FULLY_TRUSTED"
  access_levels:
    - "DENIED"
    - "READ_ONLY"
    - "LIMITED"
    - "STANDARD"
    - "ELEVATED"
    - "ADMINISTRATIVE"
  device_verification:
    fingerprint_check: true
    security_status_check: true
    update_status_check: true

# 真實滲透測試配置
red_team:
  max_concurrent_tests: 5
  test_timeout: 3600  # 秒
  report_generation: true
  scanning_tools:
    nmap: true
    masscan: false
    zmap: false
  scan_types:
    - "comprehensive"
    - "quick"
    - "stealth"
    - "basic"
  vulnerability_checks:
    - "password_policy"
    - "firewall_config"
    - "service_versions"
    - "open_ports"
    - "encryption_config"

# 真實合規檢查配置
compliance:
  check_interval: 3600  # 秒
  report_generation: true
  standards:
    - "NIST"
    - "ISO"
    - "PCI_DSS"
    - "SOX"
    - "HIPAA"
    - "GDPR"
  check_categories:
    - "SYSTEM_CONFIG"
    - "NETWORK_SECURITY"
    - "ACCESS_CONTROL"
    - "DATA_PROTECTION"
    - "MONITORING"
    - "INCIDENT_RESPONSE"
  auto_remediation: false

# 系統監控配置
monitoring:
  enabled: true
  interval: 60  # 秒
  metrics:
    - "system_performance"
    - "security_events"
    - "threat_detection"
    - "compliance_status"
  alerts:
    enabled: true
    email_notifications: false
    log_notifications: true

# 日誌配置
logging:
  level: "INFO"
  file: "real_military_firewall.log"
  max_size: "100MB"
  backup_count: 5
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"

# 資料庫配置
database:
  type: "sqlite"
  path: "real_military_firewall.db"
  backup_interval: 86400  # 秒
  retention_days: 30

# 安全配置
security:
  encryption_required: true
  authentication_required: true
  audit_logging: true
  data_protection: true
  network_isolation: true
  threat_detection: true
  compliance_monitoring: true


