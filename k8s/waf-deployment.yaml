apiVersion: apps/v1
kind: Deployment
metadata:
  name: waf-proxy
  labels:
    app: waf-proxy
spec:
  replicas: 3
  selector:
    matchLabels:
      app: waf-proxy
  template:
    metadata:
      labels:
        app: waf-proxy
    spec:
      containers:
      - name: waf-proxy
        image: ghcr.io/your-org/waf-system:latest
        ports:
        - containerPort: 8080
        env:
        - name: BACKEND_HOST
          value: "target-app-service"
        - name: BACKEND_PORT
          value: "5000"
        - name: PROXY_PORT
          value: "8080"
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /healthz
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 5
        volumeMounts:
        - name: waf-data
          mountPath: /data
      volumes:
      - name: waf-data
        persistentVolumeClaim:
          claimName: waf-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: waf-proxy-service
spec:
  selector:
    app: waf-proxy
  ports:
  - port: 8080
    targetPort: 8080
  type: ClusterIP
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: waf-pvc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: waf-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: waf-proxy
  minReplicas: 3
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80

