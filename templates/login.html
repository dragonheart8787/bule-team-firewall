<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登入 - 國防等級安全系統</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Microsoft JhengHei', 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-container {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            width: 90%;
            max-width: 400px;
        }
        .logo {
            text-align: center;
            margin-bottom: 30px;
        }
        .logo h1 {
            color: #667eea;
            font-size: 24px;
            margin-bottom: 5px;
        }
        .logo p {
            color: #666;
            font-size: 14px;
        }
        .shield-icon {
            font-size: 48px;
            margin-bottom: 10px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            color: #333;
            font-weight: bold;
        }
        input {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        input:focus {
            outline: none;
            border-color: #667eea;
        }
        .btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .btn:hover {
            transform: translateY(-2px);
        }
        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .alert {
            padding: 12px;
            border-radius: 5px;
            margin-bottom: 20px;
            display: none;
        }
        .alert.error {
            background: #fee;
            border: 1px solid #fcc;
            color: #c33;
        }
        .alert.show {
            display: block;
        }
        .info-box {
            background: #f0f7ff;
            border: 1px solid #b3d9ff;
            padding: 15px;
            border-radius: 5px;
            margin-top: 20px;
            font-size: 12px;
            color: #0066cc;
        }
        .info-box strong {
            display: block;
            margin-bottom: 5px;
        }
        .security-badge {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 20px;
            padding: 10px;
            background: #f8f9fa;
            border-radius: 5px;
            font-size: 12px;
            color: #666;
        }
        .security-badge span {
            color: #28a745;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <div class="shield-icon">🛡️</div>
            <h1>國防等級安全系統</h1>
            <p>Defense-Grade Security Platform</p>
        </div>
        
        <div id="alert" class="alert"></div>
        
        <form id="loginForm">
            <div class="form-group">
                <label for="username">用戶名</label>
                <input type="text" id="username" name="username" required autocomplete="username" placeholder="請輸入用戶名">
            </div>
            
            <div class="form-group">
                <label for="password">密碼</label>
                <input type="password" id="password" name="password" required autocomplete="current-password" placeholder="請輸入密碼">
            </div>
            
            <button type="submit" class="btn" id="loginBtn">登入系統</button>
        </form>
        
        <div class="info-box">
            <strong>預設帳號：</strong>
            管理員: admin / Admin@2025<br>
            用戶: user / User@2025
        </div>
        
        <div class="security-badge">
            🔒 <span>SHA-256 加密</span> | 🛡️ <span>DDoS 防護</span> | 🔍 <span>入侵檢測</span> | 📡 <span>中央伺服器傳輸</span>
        </div>
    </div>
    
    <script>
        const csrfToken = "{{ csrf_token }}";
        
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const btn = document.getElementById('loginBtn');
            const alert = document.getElementById('alert');
            
            btn.disabled = true;
            btn.textContent = '登入中...';
            
            try {
                const response = await fetch('/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        username: username,
                        password: password,
                        csrf_token: csrfToken
                    })
                });
                
                const data = await response.json();
                
                if (response.ok && data.success) {
                    alert.className = 'alert';
                    window.location.href = data.redirect;
                } else {
                    alert.className = 'alert error show';
                    alert.textContent = data.error || '登入失敗';
                    btn.disabled = false;
                    btn.textContent = '登入系統';
                }
            } catch (error) {
                alert.className = 'alert error show';
                alert.textContent = '網路錯誤，請稍後再試';
                btn.disabled = false;
                btn.textContent = '登入系統';
            }
        });
    </script>
</body>
</html>
