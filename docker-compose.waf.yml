version: "3.8"

services:
  waf:
    image: owasp/modsecurity-crs:nginx
    container_name: waf_modsec
    ports:
      - "8080:8080"
    environment:
      - PARANOIA=1
      - ANOMALY_INBOUND=5
      - ANOMALY_OUTBOUND=4
    volumes:
      - ./waf/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./waf/modsecurity.conf:/etc/nginx/modsecurity.d/modsecurity.conf:ro
      # 可選：掛載 CRS 規則路徑以自訂
      # - ./waf/crs-setup.conf:/etc/nginx/owasp-modsecurity-crs/crs-setup.conf:ro
    restart: unless-stopped





