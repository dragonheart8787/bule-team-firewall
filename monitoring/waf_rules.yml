groups:
- name: waf_alerts
  rules:
  - alert: HighWAFBlockedRequests
    annotations:
      description: "WAF \u5BE6\u4F8B {{ $labels.instance }} \u5728\u904E\u53BB 5 \u5206\
        \u9418\u5167\u963B\u64CB\u4E86 {{ $value }} \u500B\u8ACB\u6C42"
      summary: "WAF \u5BE6\u4F8B {{ $labels.instance }} \u963B\u64CB\u5927\u91CF\u8ACB\
        \u6C42"
    expr: sum(rate(waf_blocked_requests_total[5m])) by (instance) > 10
    for: 1m
    labels:
      severity: critical
  - alert: WAFBackendDown
    annotations:
      description: "WAF \u5F8C\u7AEF\u5BE6\u4F8B {{ $labels.instance }} \u7121\u6CD5\
        \u88AB Prometheus \u5B58\u53D6"
      summary: "WAF \u5F8C\u7AEF\u5BE6\u4F8B {{ $labels.instance }} \u96E2\u7DDA"
    expr: up{job="waf-proxy"} == 0
    for: 1m
    labels:
      severity: critical
  - alert: HighSIEMAlerts
    annotations:
      description: "SIEM \u7CFB\u7D71\u76EE\u524D\u6709 {{ $value }} \u500B\u8B66\u5831\
        \uFF0C\u53EF\u80FD\u8868\u793A\u6709\u5927\u91CF\u5B89\u5168\u4E8B\u4EF6"
      summary: "SIEM \u8B66\u5831\u6578\u91CF\u904E\u9AD8"
    expr: siem_total_alerts > 100
    for: 5m
    labels:
      severity: warning
