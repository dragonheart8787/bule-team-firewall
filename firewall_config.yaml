# 軍事級防火牆配置檔案
# Military-Grade Firewall Configuration

firewall:
  # 網路介面設定
  interface: "eth0"
  
  # 監控模式
  monitoring_mode: true
  
  # 自動阻擋
  auto_block: true
  
  # 威脅閾值 (0.0-1.0)
  threat_threshold: 0.7
  
  # 最大連線數
  max_connections: 10000
  
  # 連線超時 (秒)
  connection_timeout: 300

# 入侵檢測系統 (IDS)
ids:
  enabled: true
  
  # 簽名資料庫
  signature_database: "signatures.db"
  
  # 異常檢測
  anomaly_detection: true
  
  # 機器學習檢測
  ml_detection: true
  
  # 檢測敏感度 (1-10)
  sensitivity: 7

# 威脅情報
threat_intel:
  enabled: true
  
  # 更新間隔 (秒)
  update_interval: 3600
  
  # 威脅情報來源
  sources:
    - "https://feeds.malware-domains.com/domain_list.txt"
    - "https://rules.emergingthreats.net/blockrules/compromised-ips.txt"
    - "https://reputation.alienvault.com/reputation.data"
    - "https://www.malwaredomainlist.com/hostslist/ip.txt"
  
  # 本地威脅情報檔案
  local_sources:
    - "threat_intel/blacklist.txt"
    - "threat_intel/whitelist.txt"

# 日誌設定
logging:
  # 日誌等級
  level: "INFO"
  
  # 保留天數
  retention_days: 30
  
  # 審計啟用
  audit_enabled: true
  
  # 日誌輪轉
  log_rotation: true
  
  # 最大日誌檔案大小 (MB)
  max_log_size: 100

# 效能設定
performance:
  # 工作線程數
  worker_threads: 4
  
  # 封包佇列大小
  packet_queue_size: 10000
  
  # 告警佇列大小
  alert_queue_size: 1000
  
  # 記憶體限制 (MB)
  memory_limit: 1024

# 安全設定
security:
  # 加密演算法
  encryption_algorithm: "AES-256-GCM"
  
  # 金鑰長度
  key_length: 256
  
  # 認證方式
  authentication: "HMAC-SHA256"
  
  # 會話超時 (秒)
  session_timeout: 1800

# 通知設定
notifications:
  # 郵件通知
  email:
    enabled: false
    smtp_server: "smtp.gmail.com"
    smtp_port: 587
    username: ""
    password: ""
    recipients: []
  
  # 簡訊通知
  sms:
    enabled: false
    api_key: ""
    phone_numbers: []
  
  # Webhook通知
  webhook:
    enabled: false
    url: ""
    secret: ""

# 高可用性設定
high_availability:
  # 啟用高可用性
  enabled: false
  
  # 備援節點
  backup_nodes: []
  
  # 故障轉移時間 (秒)
  failover_time: 30
  
  # 健康檢查間隔 (秒)
  health_check_interval: 10

# 軍事級特殊設定
military:
  # 分類等級
  classification_level: "CONFIDENTIAL"
  
  # 加密標準
  encryption_standard: "FIPS-140-2"
  
  # 合規標準
  compliance: ["NIST", "ISO-27001", "Common-Criteria"]
  
  # 零信任架構
  zero_trust: true
  
  # 行為分析
  behavioral_analysis: true
  
  # 威脅獵殺
  threat_hunting: true

